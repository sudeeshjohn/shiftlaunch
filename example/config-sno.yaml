# =============================================================================
# Minimal Single Node OpenShift (SNO) Agent Configuration
# =============================================================================

services:  
  load_balancer:
    vip: "192.168.100.50"

network:
  isolation_level: "connected"
  controller_interface: "eth0"
  machine_network_cidr: "192.168.100.0/24" 
  gateway: "192.168.100.1"
  dns_forwarders:
    - "8.8.8.8"

hmc:
  ip: "192.168.100.10"
  username: "hscroot"
  password: "YOUR_HMC_PASSWORD"

openshift:
  cluster_name: "sno-cluster"
  version: "4.21.18"
  release_type: "official" 
  base_domain: "example.local"
  pull_secret_file: "~/pull-secret.json"
  ssh_public_key_file: "~/.ssh/id_rsa.pub"

nodes:
  boot_method: "agent"
  
  masters:
    - name: "sno-0"
      ip: "192.168.100.60"
      existing_lpar_name: "lpar-sno-0"
      system_name: "Power-System-9080"