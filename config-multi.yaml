# =============================================================================
# ShiftLaunch Agent: Local BYOI Boot Agent Configuration
# =============================================================================

# --- 1. CONTROL TOGGLES (The "Who") ---
# Tell the Agent which services to install and manage locally on this machine.
managed_services:
  dns: true            # Setup local dnsmasq (Answers for the cluster domain)
  dhcp: true           # Setup local dhcp (Assigns IPs to LPARs)
  pxe: true            # Setup local TFTP (Boot files for Netboot)
  load_balancer: true  # Setup local HAProxy (Routes traffic for loadbalancer_ip)
  nfs: true            # Setup local NFS server for ISO hosting

# --- 2. CONTROLLER (The "Where") ---
controller:
  # ip: "192.0.2.50"         # Auto-discovered via the interface below
  network_interface: "eth0"     # Physical interface to bind VIP and services

# --- 3. HMC ACCESS ---
hmc:
  ip: "192.0.2.10"
  username: "YOUR_HMC_USERNAME"
  password: "YOUR_HMC_PASSWORD"

# --- 4. NETWORK DATA (The "What") ---
network:
  # -------------------------------------------------------------------------
  # CLUSTER ENTRY POINT (VIP)
  # - If managed_services.load_balancer = TRUE: The Agent creates an IP alias 
  #   for this on the controller's interface. (Must be an unused/free IP).
  # - If managed_services.load_balancer = FALSE: The Agent assumes this IP 
  #   lives on an external appliance (e.g., F5) and only validates it.
  # -------------------------------------------------------------------------
  loadbalancer_ip: "192.0.2.100"
  machine_network_cidr: "192.0.2.0/20" 
  gateway: "192.0.2.1"
  # Optional: Provide an external nameserver ONLY if managed_services.dns is false.
  # Otherwise, the agent dynamically uses the discovered Controller IP.
  nameserver: ""
  dns_forwarders:
    - "198.51.100.1"
    - "198.51.100.2"

# --- 5. OPENSHIFT PAYLOAD ---
openshift:
  cluster_name: "ocp-multi"
  version: "4.21"
  base_domain: "example.local"
  
  cluster_network_cidr: "10.128.0.0/14"
  cluster_network_host_prefix: 23
  service_network: "172.30.0.0/16"
  
  pull_secret_file: "./pull-secret.json"
  ssh_public_key_file: "~/.ssh/id_rsa.pub"
  
  rhcos_images:
    kernel_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.18/latest/rhcos-live-kernel-ppc64le"
    initramfs_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.18/latest/rhcos-live-initramfs.ppc64le.img"
    rootfs_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.18/latest/rhcos-live-rootfs.ppc64le.img"
    checksum_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.18/latest/sha256sum.txt"
        
  ocp_client_config:
    ocp_client: "https://mirror.openshift.com/pub/openshift-v4/multi/clients/ocp/candidate-4.21/ppc64le/openshift-client-linux.tar.gz"
    ocp_installer: "https://mirror.openshift.com/pub/openshift-v4/multi/clients/ocp/candidate-4.21/ppc64le/openshift-install-linux.tar.gz"

# --- 6. NODE TARGETS (HMC / BYOI) ---
nodes:
  boot_method: "iso"        # boot_method can be either netboot or iso
  
  # -------------------------------------------------------------------------
  # SINGLE-NODE OPENSHIFT (SNO) EXAMPLE
  # To deploy SNO: Uncomment this block, and delete the bootstrap, masters, 
  # and workers blocks below. The Agent will automatically detect SNO mode.
  # -------------------------------------------------------------------------
  #sno:
  #  - name: "sno-0"
  #    ip: "192.0.2.101"
  #    existing_lpar_name: "ocp-sno-lpar-1"
  #    system_name: "YOUR_SYSTEM_NAME"

  # For Netboot it requires a bootstrap node as well

  # bootstrap:
  #   - name: "bootstrap"
  #     ip: "192.0.2.110"
  #     existing_lpar_name: "ocp-multi-1-bootstrap"
  #     system_name: "YOUR_SYSTEM_NAME"

  masters:
    - name: "master-0"
      ip: "192.0.2.111"
      existing_lpar_name: "ocp-multi-1-master-0"
      system_name: "YOUR_SYSTEM_NAME"
    - name: "master-1"
      ip: "192.0.2.112"
      existing_lpar_name: "ocp-multi-1-master-1"
      system_name: "YOUR_SYSTEM_NAME"
    - name: "master-2"
      ip: "192.0.2.113"
      existing_lpar_name: "ocp-multi-1-master-2"
      system_name: "YOUR_SYSTEM_NAME"

  workers:
    - name: "worker-0"
      ip: "192.0.2.121"
      existing_lpar_name: "ocp-multi-1-worker-0"
      system_name: "YOUR_SYSTEM_NAME"
    - name: "worker-1"
      ip: "192.0.2.122"
      existing_lpar_name: "ocp-multi-1-worker-1"
      system_name: "YOUR_SYSTEM_NAME"